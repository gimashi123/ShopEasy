syntax = "proto3";

package com.shopeasy.grpc.auth;

option java_multiple_files = true;
option java_package = "com.shopeasy.grpc.auth";
option java_outer_classname = "AuthServiceProto";

// ─── Request / Response messages ─────────────────────────────────────────────

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool   valid       = 1;
  string user_id     = 2;
  string username    = 3;
  string email       = 4;
  repeated string roles = 5;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  string user_id   = 1;
  string username  = 2;
  string email     = 3;
  repeated string roles = 4;
  bool   active    = 5;
}

// ─── Service definition ───────────────────────────────────────────────────────

// AuthService – called by downstream services to validate JWT tokens
// and retrieve user information without hitting the HTTP auth endpoint.
service AuthService {
  // Validates a JWT and returns the decoded principal.
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);

  // Returns full user details for a given user ID.
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
}
