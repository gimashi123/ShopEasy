server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:8081"
              - "${FRONTEND_ORIGIN:}"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        - id: delivery-service
          uri: ${DELIVERY_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/delivery/**
          filters:
            - StripPrefix=0

        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=0

        - id: product-service
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=0

        - id: promotion-service
          uri: ${PROMOTION_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/promotion/**
          filters:
            - StripPrefix=0

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/notification/**
          filters:
            - StripPrefix=0

        - id: supermarket-service
          uri: ${SUPERMARKET_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/supermarket/**
          filters:
            - StripPrefix=0





management:
  endpoints:
    web:
      exposure:
        include: health, info, routes
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
